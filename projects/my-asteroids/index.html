<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dan's Asteroids</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            text-align: center;
        }

        canvas {
            border: 2px solid #fff;
            background: #000;
            display: block;
            margin: 10px auto;
        }

        #ui {
            color: #fff;
            font-size: 20px;
            margin: 10px;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border: 3px solid #fff;
            border-radius: 10px;
            color: #fff;
            display: none;
            text-align: center;
        }

        #gameOver h1 {
            margin: 0 0 20px 0;
            color: #f00;
        }

        button {
            background: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover {
            background: #ccc;
        }

        #instructions {
            color: #aaa;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <span>Score: <span id="score">0</span></span> &nbsp;&nbsp;&nbsp;
            <span>Lives: <span id="lives">3</span></span>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="instructions">
            Arrow Keys: Move &nbsp;|&nbsp; Space: Shoot &nbsp;|&nbsp; P: Pause
        </div>
    </div>

    <div id="gameOver">
        <h1>GAME OVER</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let lives = 3;

        // Player ship
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            angle: -Math.PI / 2, // Point up
            speed: 0,
            maxSpeed: 5,
            rotation: 0,
            friction: 0.98
        };

        // Game arrays
        let asteroids = [];
        let bullets = [];

        // Controls
        const keys = {};

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (e.key === ' ' && gameRunning && !gamePaused) {
                e.preventDefault();
                shoot();
            }
            
            if (e.key === 'p' || e.key === 'P') {
                gamePaused = !gamePaused;
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Start button
        window.onload = () => {
            const startBtn = document.createElement('button');
            startBtn.textContent = 'Start Game';
            startBtn.style.fontSize = '24px';
            startBtn.onclick = () => {
                startBtn.remove();
                startGame();
            };
            document.getElementById('gameContainer').appendChild(startBtn);
        };

        // Initialize game
        function startGame() {
            score = 0;
            lives = 3;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.speed = 0;
            player.angle = -Math.PI / 2;
            asteroids = [];
            bullets = [];
            gameRunning = true;
            gamePaused = false;
            
            // Create initial asteroids
            for (let i = 0; i < 5; i++) {
                createAsteroid('large');
            }
            
            updateUI();
            document.getElementById('gameOver').style.display = 'none';
            gameLoop();
        }

        // Create asteroid
        function createAsteroid(size, x, y) {
            const radius = size === 'large' ? 40 : size === 'medium' ? 25 : 15;
            const speed = size === 'large' ? 1 : size === 'medium' ? 1.5 : 2;
            
            // If no position given, spawn at edge
            if (x === undefined) {
                const edge = Math.floor(Math.random() * 4);
                if (edge === 0) { x = Math.random() * canvas.width; y = -radius; }
                else if (edge === 1) { x = canvas.width + radius; y = Math.random() * canvas.height; }
                else if (edge === 2) { x = Math.random() * canvas.width; y = canvas.height + radius; }
                else { x = -radius; y = Math.random() * canvas.height; }
            }
            
            const angle = Math.random() * Math.PI * 2;
            
            asteroids.push({
                x: x,
                y: y,
                radius: radius,
                size: size,
                dx: Math.cos(angle) * speed,
                dy: Math.sin(angle) * speed,
                points: Math.floor(Math.random() * 3) + 6 // 6-8 points for jagged look
            });
        }

        // Shoot bullet
        function shoot() {
            bullets.push({
                x: player.x + Math.cos(player.angle) * player.radius,
                y: player.y + Math.sin(player.angle) * player.radius,
                dx: Math.cos(player.angle) * 7,
                dy: Math.sin(player.angle) * 7,
                life: 60 // Dies after 60 frames
            });
        }

        // Update player
        function updatePlayer() {
            // Rotation
            if (keys['ArrowLeft']) {
                player.angle -= 0.1;
            }
            if (keys['ArrowRight']) {
                player.angle += 0.1;
            }

            // Thrust
            if (keys['ArrowUp']) {
                player.speed += 0.3;
                if (player.speed > player.maxSpeed) {
                    player.speed = player.maxSpeed;
                }
            }

            // Apply friction
            player.speed *= player.friction;

            // Move player
            player.x += Math.cos(player.angle) * player.speed;
            player.y += Math.sin(player.angle) * player.speed;

            // Wrap around screen
            if (player.x > canvas.width) player.x = 0;
            if (player.x < 0) player.x = canvas.width;
            if (player.y > canvas.height) player.y = 0;
            if (player.y < 0) player.y = canvas.height;
        }

        // Update asteroids
        function updateAsteroids() {
            asteroids.forEach((asteroid, index) => {
                asteroid.x += asteroid.dx;
                asteroid.y += asteroid.dy;

                // Wrap around
                if (asteroid.x > canvas.width + asteroid.radius) asteroid.x = -asteroid.radius;
                if (asteroid.x < -asteroid.radius) asteroid.x = canvas.width + asteroid.radius;
                if (asteroid.y > canvas.height + asteroid.radius) asteroid.y = -asteroid.radius;
                if (asteroid.y < -asteroid.radius) asteroid.y = canvas.height + asteroid.radius;

                // Check collision with player
                const dist = Math.hypot(player.x - asteroid.x, player.y - asteroid.y);
                if (dist < player.radius + asteroid.radius) {
                    lives--;
                    updateUI();
                    
                    if (lives <= 0) {
                        endGame();
                    } else {
                        // Reset player position (keep the asteroid!)
                        player.x = canvas.width / 2;
                        player.y = canvas.height / 2;
                        player.speed = 0;
                        player.angle = -Math.PI / 2;
                    }
                }
            });
        }

        // Update bullets
        function updateBullets() {
            bullets.forEach((bullet, bIndex) => {
                bullet.x += bullet.dx;
                bullet.y += bullet.dy;
                bullet.life--;

                // Remove if off screen or life depleted
                if (bullet.life <= 0 || 
                    bullet.x < 0 || bullet.x > canvas.width ||
                    bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(bIndex, 1);
                    return;
                }

                // Check asteroid collisions
                asteroids.forEach((asteroid, aIndex) => {
                    const dist = Math.hypot(bullet.x - asteroid.x, bullet.y - asteroid.y);
                    if (dist < asteroid.radius) {
                        // Remove bullet and asteroid
                        bullets.splice(bIndex, 1);
                        asteroids.splice(aIndex, 1);

                        // Update score
                        if (asteroid.size === 'large') score += 10;
                        else if (asteroid.size === 'medium') score += 20;
                        else score += 30;
                        updateUI();

                        // Break into smaller asteroids
                        if (asteroid.size === 'large') {
                            createAsteroid('medium', asteroid.x, asteroid.y);
                            createAsteroid('medium', asteroid.x, asteroid.y);
                        } else if (asteroid.size === 'medium') {
                            createAsteroid('small', asteroid.x, asteroid.y);
                            createAsteroid('small', asteroid.x, asteroid.y);
                        }

                        // Spawn new asteroid if none left
                        if (asteroids.length === 0) {
                            for (let i = 0; i < 5; i++) {
                                createAsteroid('large');
                            }
                        }
                    }
                });
            });
        }

        // Draw player ship
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle + Math.PI / 2);

            // Triangle ship
            ctx.beginPath();
            ctx.moveTo(0, -player.radius);
            ctx.lineTo(-player.radius / 2, player.radius);
            ctx.lineTo(player.radius / 2, player.radius);
            ctx.closePath();
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Thruster flame (when moving)
            if (keys['ArrowUp'] && player.speed > 0.5) {
                ctx.beginPath();
                ctx.moveTo(-player.radius / 3, player.radius);
                ctx.lineTo(0, player.radius + 8);
                ctx.lineTo(player.radius / 3, player.radius);
                ctx.fillStyle = '#ff4400';
                ctx.fill();
            }

            ctx.restore();
        }

        // Draw asteroids
        function drawAsteroids() {
            asteroids.forEach(asteroid => {
                ctx.save();
                ctx.translate(asteroid.x, asteroid.y);
                
                ctx.beginPath();
                for (let i = 0; i < asteroid.points; i++) {
                    const angle = (i / asteroid.points) * Math.PI * 2;
                    const radius = asteroid.radius + Math.sin(i) * 5;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.restore();
            });
        }

        // Draw bullets
        function drawBullets() {
            ctx.fillStyle = '#fff';
            bullets.forEach(bullet => {
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Update UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
        }

        // End game
        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        // Restart game
        function restartGame() {
            startGame();
        }

        // Main game loop
        function gameLoop() {
            if (!gameRunning) return;

            if (!gamePaused) {
                // Clear canvas
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Update
                updatePlayer();
                updateAsteroids();
                updateBullets();

                // Draw
                drawPlayer();
                drawAsteroids();
                drawBullets();

            } else {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
